name: Release Browser Extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Setup Node
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build extension archives
        if: ${{ steps.release.outputs.release_created }}
        run: |
          set -euo pipefail
          npm run build -- "${{ steps.release.outputs.tag_name }}"

      - name: Upload release artifacts
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" "dist/chromium-extension-${{ steps.release.outputs.tag_name }}.zip" --clobber
          gh release upload "${{ steps.release.outputs.tag_name }}" "dist/firefox-extension-${{ steps.release.outputs.tag_name }}.zip" --clobber
